<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Vantix</title>
    <script>
      // Single Page App redirect for GitHub Pages
      // Saves the current path to sessionStorage then redirects to index.html
      sessionStorage.redirect = location.href;
      location.replace(location.protocol + '//' + location.hostname + (location.port ? ':' + location.port : '') + '/Vantix/');
    </script>
  </head>
  <body></body>
</html>
